name: Sync Pricer from P21

on:
  schedule:
    # Nightly at 06:30 UTC (offset from E2G sync to avoid contention)
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Pricer sync from P21
        env:
          WEBHOOK_URL: ${{ vars.SYNC_PRICER_URL || 'https://plan-crafted-joy.lovable.app/api/public/sync-pricer' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set"
            exit 1
          fi
          echo "POST $WEBHOOK_URL"
          response=$(curl -sS -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            exit 1
          fi
