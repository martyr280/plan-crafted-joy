name: Run SQL Schedules

on:
  schedule:
    # Every 10 minutes. GitHub may add a few minutes of jitter.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger due SQL schedules
        env:
          WEBHOOK_URL: ${{ vars.RUN_SQL_SCHEDULES_URL || 'https://plan-crafted-joy.lovable.app/api/public/run-sql-schedules' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set"
            exit 1
          fi
          echo "POST $WEBHOOK_URL"
          response=$(curl -sS -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            exit 1
          fi
