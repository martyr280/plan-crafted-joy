name: Release agent .exe

on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release (e.g. agent-v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - run: bun run build:exe

      - name: Compute sha256
        run: sha256sum dist/ndiOS-agent.exe > dist/ndiOS-agent.exe.sha256

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            agent/dist/ndiOS-agent.exe
            agent/dist/ndiOS-agent.exe.sha256
